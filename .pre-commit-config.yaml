repos:
  # 1. TruffleHog Secrets Scanning on local commits
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.63.11
    hooks:
      - id: trufflehog
        name: TruffleHog Secrets Scan
        entry: trufflehog git file://. --since=HEAD
        language: system
        stages: [commit]

  # 2. Python Code Formatting and Import Sorting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        types: [python]
        files: ^securestack/lambdas/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        types: [python]
        files: ^securestack/lambdas/

  # 3. Terraform Format checks
  - repo: https://github.com/hashicorp/terraform
    rev: v1.8.0
    hooks:
      - id: terraform_fmt
        files: ^securestack/infra/

  # 4. Next.js / React Formatting (Prettier & ESLint)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, json]
        files: ^securestack/dashboard/src/
