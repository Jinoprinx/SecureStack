name: Deploy Next.js Dashboard

on:
  push:
    branches: [ main ]
    paths:
      - 'securestack/dashboard/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          audience: sigstore

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: securestack/dashboard/package-lock.json

      - name: Install dependencies
        run: |
          cd securestack/dashboard
          npm ci

      - name: Build Next.js Static Export
        run: |
          cd securestack/dashboard
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_GATEWAY_URL }}

      # Syncs build folder out/_next folder and static files to S3 bucket
      - name: Deploy to S3
        run: |
          aws s3 sync securestack/dashboard/out/ s3://${{ secrets.DASHBOARD_S3_BUCKET }} --delete

      # Invalidate CloudFront to force cache refresh for users
      - name: Invalidate CloudFront Distribution
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
